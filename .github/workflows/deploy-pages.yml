name: Deploy PWA to GitHub Pages

# Pubblica la PWA (cartella app/) su GitHub Pages a ogni push su main.
# Questo fornisce HTTPS gratuito, indispensabile perche' microfono e GPS
# funzionino sui telefoni senza costi.

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

# Permessi minimi necessari al deploy su Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Una sola distribuzione alla volta; non annullare quelle gia' in corso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (solo cartella app/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
