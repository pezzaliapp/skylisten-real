<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#0b0f14">
  <title>SkyListen Real — offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 24px;
      box-sizing: border-box;
      background: #0b0f14;
      color: #e7eef8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
    }
    h1 { margin: 0; font-size: 22px; }
    p { margin: 0; max-width: 32rem; color: #9db0c7; line-height: 1.5; }
    button {
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #36506d;
      background: #182437;
      color: #fff;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }
    button:focus-visible { outline: 3px solid #5cc8ff; outline-offset: 2px; }
  </style>
</head>
<body>
  <h1>Sei offline</h1>
  <p>
    SkyListen Real funziona anche senza rete, ma questa pagina non era ancora
    in cache. Riconnettiti e ricarica per completare l'installazione.
  </p>
  <p>La mesh tra telefoni richiede comunque una rete locale (Wi-Fi) condivisa.</p>
  <button onclick="location.reload()">Riprova</button>
</body>
</html>
